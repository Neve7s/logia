    <!-- ── Structured Data: FAQPage ──────────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "¿LogIA calcula automáticamente el IGV en facturación?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sí. LogIA detecta automáticamente si un servicio está sujeto a IGV o está exento. Los fletes marítimos y aéreos están exonerados del IGV en Perú. Servicios en destino u origen pueden tener IGV según el tipo de operación."
          }
        },
        {
          "@type": "Question",
          "name": "¿Qué son las detracciones en facturación SUNAT?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Las detracciones son retenciones de impuestos que SUNAT aplica a ciertos servicios. LogIA calcula automáticamente si un servicio tiene detracción y el porcentaje aplicable, sin que tengas que hacerlo manualmente."
          }
        },
        {
          "@type": "Question",
          "name": "¿Para qué sirve el Consultador de Importadores?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "El Consultador es un data lake con datos de SUNAT de importadores peruanos. Muestra resúmenes de empresas, volumen de importación, frecuencia, países de origen y destino. Se actualiza cada 7 días."
          }
        },
        {
          "@type": "Question",
          "name": "¿Qué es el ATS de LogIA?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "El ATS (Applicant Tracking System) es el sistema de reclutamiento de LogIA. Funciona como LinkedIn para la logística: publica vacantes, recibe postulaciones y gestiona candidatos con un flujo visual Kanban."
          }
        },
        {
          "@type": "Question",
          "name": "¿Los fletes marítimos pagan IGV en Perú?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. Los fletes marítimos y aéreos de transporte internacional están exonerados del IGV en Perú según la SUNAT. LogIA aplica esta exoneración automáticamente al facturar fletes."
          }
        }
      ]
    }
    </script>
